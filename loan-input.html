<h2>Tambah Loan</h2>

<form id="loanForm">
      <label>Nama Loan</label>
      <input type="text" id="nama" required />

      <label>Total Loan</label>
      <input type="number" id="total" required />

      <label>Tenor (bulan)</label>
      <input type="number" id="tenor" required />

      <label>Akun</label>
      <select id="akun">
            <option value="cash">Cash</option>
            <option value="cimb">CIMB</option>
            <option value="sea">SeaBank</option>
            <option value="neo">Neo</option>
      </select>

      <label>Tanggal</label>
      <input type="date" id="tanggal" />

      <button type="submit">Simpan Loan</button>
</form>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script type="module" src="./js/pages/loanInput.js"></script>
