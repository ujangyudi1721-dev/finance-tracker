<!doctype html>
<html>
      <head>
            <title>Dashboard</title>
            <link rel="stylesheet" href="style.css" />
      </head>

      <body>
            <!-- Nav bar -->
            <nav>
                  <a href="index.html">Dashboard</a>
                  <a href="input.html">Transaksi</a>
                  <a href="riwayat.html">Riwayat transaksi</a>
                  <a href="loan.html">Pinjaman</a>
                  <a href="loan-input.html">Tambah Loan</a>
            </nav>

            <h2>Dashboard</h2>

            <!-- class summary -->
            <div class="summary">
                  <!-- card income -->
                  <div class="card income">
                        <h3>Total Income</h3>
                        <span id="totalIncome">Rp 0</span>
                  </div>

                  <!-- card expense -->
                  <div class="card expense">
                        <h3>Total Expense</h3>
                        <span id="totalExpense">Rp 0</span>
                  </div>

                  <!-- card expense -->
                  <div class="card aset">
                        <h3>Total Aset</h3>
                        <span id="totalAset">Rp 0</span>
                  </div>

                  <!-- card saldo -->
                  <div class="card saldo">
                        <h3>Saldo</h3>
                        <span id="totalSaldo">Rp 0</span>
                  </div>
            </div>

            <!-- account cash dan bank -->
            <h2>Akun Deposit</h2>

            <div class="account">
                  <div class="acount cash">
                        <h3>Saldo Cash</h3>
                        <span id="totalCash">Rp 0</span>
                  </div>

                  <div class="acount cimb">
                        <h3>CIMB NIAGA</h3>
                        <span id="totalCimb">Rp 0</span>
                  </div>

                  <div class="acount sea">
                        <h3>Sea Bank</h3>
                        <span id="totalSea">Rp 0</span>
                  </div>

                  <div class="acount neo">
                        <h3>Neo Bank</h3>
                        <span id="totalNeo">Rp 0</span>
                  </div>

                  <div class="acount bri">
                        <h3>Bank BRI</h3>
                        <span id="totalBri">Rp 0</span>
                  </div>
            </div>

            <!-- account cash dan bank -->
           <h2>Loans</h2>
                
            <!-- canvas grafik -->
            <h2>Grafik Keuangan</h2>
            <div class="chart-container">
                  <canvas id="financeChart"></canvas>
            </div>

            <div id="loanContainer"></div>
            <div>Total Loan : <span id="totalLoan"></span></div>
            <div>Sisa Hutang : <span id="remainingLoan"></span> </div>


            <!-- script js-->
            <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
            <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
            <script type="module" src="js/pages/dashboard.js"></script>
      </body>
</html>
