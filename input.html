<!doctype html>
<html lang="en">
      <head>
            <meta charset="UTF-8" />
            <meta
                  name="viewport"
                  content="width=device-width, initial-scale=1.0"
            />
            <title>Input Transaksi</title>
            <link rel="stylesheet" href="style.css" />
      </head>
      <body>
            <nav>
                  <a href="index.html">Dashboard</a>
                  <a href="riwayat.html">Riwayat Transaksi</a>
            </nav>

            <h2>Input Transaksi</h2>

            <form id="formKeuangan">
                  <input type="date" id="tanggal" placeholder="Tanggal" />
                  <input type="text" id="kategori" placeholder="Kategori" />
                  <input type="number" id="jumlah" placeholder="Jumlah" />
                  <input type="text" id="keterangan" placeholder="Keterangan" />

                  <select id="tipe">
                        <option value="income">Income</option>
                        <option value="expense">Expense</option>
                  </select>

                  <select id="akun">
                        <option value="cash">Cash</option>
                        <option value="cimb">CIMB</option>
                  </select>

                  <button type="submit" id="editData">Update</button>
                  <button id="btnSimpan">Simpan</button>
            </form>

            <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
            <script src="app.js"></script>
            <script src="input.js"></script>
      </body>
</html>
